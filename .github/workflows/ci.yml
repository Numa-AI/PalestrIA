# ──────────────────────────────────────────────────────────────────────────────
# CI — PalestrIA SaaS (zero-build: HTML/JS vanilla + Supabase)
#
# Gira su ogni push e pull_request. Tre job indipendenti:
#   1. db-baseline   → valida la migration consolidata (00000000000000_baseline.sql)
#                      avviando lo stack Supabase locale e applicando SOLO la baseline.
#   2. functions     → `deno check` su tutte le supabase/functions/**/index.ts (Deno 2).
#   3. lint-web      → lint leggero/opzionale dell'HTML/JS statico (non blocca il build).
#
# Niente build frontend: il sito è servito così com'è (zero-build).
# I test RLS cross-tenant sono descritti come placeholder dentro il job db-baseline.
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Annulla run obsolete sullo stesso ref (risparmia minuti CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1) Validazione schema DB: applica la baseline su uno stack Supabase locale.
  #
  # NB: la cartella supabase/migrations/ contiene la baseline SaaS
  #     (00000000000000_baseline.sql) PIÙ lo storico delle ~125 migration
  #     single-tenant, tenute solo come riferimento. Sul progetto greenfield va
  #     applicata SOLO la baseline, quindi qui isoliamo la baseline prima del reset.
  #     La baseline dipende dallo schema `auth` (auth.users, auth.uid(), auth.jwt()),
  #     perciò serve lo stack Supabase (Postgres ephemeral "nudo" non basterebbe).
  # ────────────────────────────────────────────────────────────────────────────
  db-baseline:
    name: Validate baseline migration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────────────
      # Tripwire STATICO anti-USING(true): nessuna policy RLS deve usare
      # USING(true) / WITH CHECK(true) su una tabella business (= la riga sarebbe
      # visibile/scrivibile a OGNI tenant → data-leak cross-tenant). È un controllo
      # veloce (niente DB) complementare al test runtime più sotto: intercetta una
      # policy non org-scoped già allo statico, anche su tabelle non esercitate dal
      # test. Unica eccezione ammessa: 'plans' (catalogo globale dei piani SaaS,
      # senza org_id). Se aggiungi una nuova tabella GLOBALE legittima con
      # USING(true), estendi la whitelist nel `grep -vi` qui sotto.
      # ──────────────────────────────────────────────────────────────────────
      - name: Guard statico — nessuna policy USING(true) fuori whitelist
        run: |
          set -euo pipefail
          # Strip dei commenti SQL (--...) PRIMA del match: la prosa descrittiva che
          # cita testualmente "USING(true)" nei commenti (es. l'intestazione della
          # baseline) non deve far scattare il guard — solo il codice reale conta.
          hits=$(for f in supabase/migrations/*.sql; do
                   sed 's/--.*//' "$f" \
                     | grep -niE 'using[[:space:]]*\([[:space:]]*true[[:space:]]*\)|with[[:space:]]+check[[:space:]]*\([[:space:]]*true[[:space:]]*\)' \
                     | grep -vi 'plans' \
                     | sed "s|^|$f:|" || true
                 done)
          if [ -n "$hits" ]; then
            echo "::error::Policy RLS con USING(true)/WITH CHECK(true) fuori whitelist (possibile data-leak cross-tenant):"
            echo "$hits"
            exit 1
          fi
          echo "OK: nessuna policy USING(true)/WITH CHECK(true) inattesa (sola eccezione: plans)."

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Isola la baseline (escludi lo storico single-tenant)
        # Spostiamo fuori tutte le migration tranne la baseline, così `db reset`
        # applica esclusivamente lo schema SaaS consolidato come accadrebbe su un
        # progetto Supabase greenfield.
        run: |
          set -euo pipefail
          mkdir -p /tmp/legacy-migrations
          find supabase/migrations -maxdepth 1 -name '*.sql' \
            ! -name '00000000000000_baseline.sql' \
            -exec mv {} /tmp/legacy-migrations/ \;
          echo "Migration applicate in CI:"
          ls -1 supabase/migrations

      - name: Avvia il database locale (fornisce lo schema auth)
        run: supabase db start

      - name: Applica la baseline + seed (valida la migration)
        # `db reset` ricrea il DB applicando le migration presenti + il seed.
        # Se la baseline ha errori di sintassi/dipendenze il job fallisce qui.
        run: supabase db reset --debug

      # ──────────────────────────────────────────────────────────────────────
      # Applica le migration post-baseline (00000000000001+) sopra la baseline.
      #
      # `db reset` (step precedente) applica SOLO la baseline (le altre migration
      # SaaS — operational_rpcs, post_deploy_fixes, fix_create_organization,
      # platform_admin, stripe_connect — erano state spostate in /tmp per validare
      # la baseline in isolamento). Le ri-applichiamo qui in ordine, esattamente
      # come sul progetto remoto, così il test RLS gira sullo schema COMPLETO ed
      # esercita davvero le RPC (get_availability_range/get_slot_attendees/
      # get_all_profiles) e la versione corrente di create_organization
      # (00000000000003). Il test resta comunque robusto: salta in modo pulito le
      # RPC assenti. La baseline-isolation resta validata dallo step `db reset`.
      - name: Applica le migration post-baseline (RPC e fix)
        run: |
          set -euo pipefail
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          for f in $(ls -1 /tmp/legacy-migrations/*.sql 2>/dev/null | sort); do
            echo "→ applico $(basename "$f")"
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      # ──────────────────────────────────────────────────────────────────────
      # TEST RLS CROSS-TENANT — isolamento multi-tenant (RLS + org_id).
      #
      # Esegue tests/rls/cross_tenant.sql contro lo stack locale. Lo script:
      #   • crea 2 org (A/B) con i rispettivi owner via create_organization;
      #   • popola dati REALI in ENTRAMBE (profiles, payments, packages, bookings);
      #   • impersona l'owner di A (claim JWT + `set local role authenticated`) e
      #     verifica che NON veda/aggiorni/cancelli/inserisca dati di B (e viceversa);
      #   • verifica il contratto di scoping delle RPC pubbliche per-slug e
      #     l'isolamento di get_all_profiles() via current_org_id();
      #   • prova anche che una scrittura LEGITTIMA nella propria org riesce.
      # Una qualsiasi `raise exception` ⇒ exit code != 0 ⇒ il job fallisce.
      # ──────────────────────────────────────────────────────────────────────
      - name: RLS cross-tenant isolation tests
        run: |
          set -euo pipefail
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f tests/rls/cross_tenant.sql

  # ────────────────────────────────────────────────────────────────────────────
  # 2) Type-check delle Edge Function (Deno 2). Risolve gli import npm:.
  # ────────────────────────────────────────────────────────────────────────────
  functions:
    name: Deno check edge functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # Allineato a config.toml → [edge_runtime] deno_version = 2
          deno-version: v2.x

      - name: Type-check tutte le functions
        # `deno check` scarica e valida i tipi degli import (npm:stripe,
        # npm:@supabase/supabase-js, npm:web-push). Niente lock file nel repo,
        # quindi --no-lock evita falsi negativi su CI.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/functions/*/index.ts)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nessuna edge function trovata."; exit 0
          fi
          printf 'Controllo %d function:\n' "${#files[@]}"
          printf '  - %s\n' "${files[@]}"
          deno check --no-lock "${files[@]}"

  # ────────────────────────────────────────────────────────────────────────────
  # 3) Lint leggero HTML/JS statico (opzionale, non blocca: continue-on-error).
  #    Niente bundler: controlliamo solo la sintassi JS dei file alla radice.
  # ────────────────────────────────────────────────────────────────────────────
  lint-web:
    name: Lint web (leggero, opzionale)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sanity-check sintassi JS
        # Parsing rapido con `node --check` su tutti i .js (no dipendenze, no build).
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          fail=0
          for f in js/**/*.js **/*.js; do
            case "$f" in
              node_modules/*|sw.js) ;;  # sw.js usa API service worker: salta
            esac
            node --check "$f" || { echo "::warning file=$f::sintassi JS non valida"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "JS OK" || echo "Trovati warning di sintassi (non bloccanti)."

      - name: Validazione HTML (opzionale)
        run: |
          npx --yes html-validate "**/*.html" || \
            echo "::warning::html-validate ha segnalato problemi (non bloccanti)."
