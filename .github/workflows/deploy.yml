# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY — PalestrIA SaaS
#
# Trigger: SOLO avvio manuale (workflow_dispatch). Il job Supabase è gated
# dall'environment "production": configura eventuali reviewer su GitHub →
# Settings → Environments → production.
#
# Cosa fa:
#   • Il SITO su GitHub Pages è pubblicato da GitHub direttamente dal branch main
#     (Source = "Deploy from a branch") a ogni push: NON è gestito da questo file.
#   • supabase → (SOLO su avvio manuale, workflow_dispatch) `supabase db push` +
#                `supabase functions deploy`, se i secret sono configurati.
#
# ── SECRET RICHIESTI (Settings → Environments → production → Secrets) ──────────
#   SUPABASE_ACCESS_TOKEN   Personal Access Token Supabase (Account → Access Tokens).
#                           Necessario per `supabase login`/link/push/deploy.
#   SUPABASE_PROJECT_REF    Project ref del progetto remoto (es. abcdefghijklmno),
#                           dalla URL del dashboard o `supabase projects list`.
#
#   Se i due secret NON sono presenti, il job supabase viene SALTATO (lo step
#   "guard" lo segnala) e il deploy del sito su Pages procede comunque.
#
#   Le secret di RUNTIME delle Edge Function (STRIPE_SECRET_KEY,
#   STRIPE_WEBHOOK_SECRET, SUPABASE_SERVICE_ROLE_KEY, SITE_URL, VAPID, ...) si
#   gestiscono lato Supabase (`supabase secrets set ...`), NON qui.
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy

# Solo avvio MANUALE: il deploy Supabase è on-demand (di norma DB/functions si
# applicano via CLI). Il sito si pubblica da solo dal branch (vedi sopra), quindi
# non serve un trigger su push — evita anche le email di fallimento del vecchio job
# Pages (che richiedeva Source="GitHub Actions" e falliva su configure-pages).
on:
  workflow_dispatch:

# Permessi minimi (solo checkout per il job Supabase).
permissions:
  contents: read

# Una sola deploy alla volta; non annullare in corso (un deploy a metà è peggio).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Sito statico → GitHub Pages: NON gestito qui. La Source di Pages è
  # "Deploy from a branch" (main) e GitHub pubblica la root del repo col suo
  # workflow interno a ogni push. Il vecchio job basato su actions/deploy-pages
  # richiedeva Source="GitHub Actions" e falliva in ~11s (configure-pages) → email
  # di errore inutili. Rimosso. Per gestire Pages da qui: Settings → Pages →
  # Source = GitHub Actions e ripristina configure-pages + upload-pages-artifact +
  # deploy-pages (rimettendo anche il trigger push).
  # ────────────────────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────────────
  # Supabase remoto → migration (db push) + edge functions (functions deploy).
  # Gira SOLO su avvio manuale (workflow_dispatch) e solo se i secret SUPABASE_*
  # sono configurati (altrimenti lo step "guard" salta gli step e il job resta verde).
  # ────────────────────────────────────────────────────────────────────────────
  supabase:
    name: Deploy Supabase (DB + functions)
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Guard — verifica presenza secret Supabase
        id: guard
        # I secret non sono leggibili in `if:` a livello di step in modo affidabile,
        # quindi li promuoviamo a output e saltiamo gli step successivi se mancano.
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Secret Supabase presenti: procedo con db push + functions deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_ACCESS_TOKEN/SUPABASE_PROJECT_REF mancanti — deploy Supabase saltato."
          fi

      - name: Checkout
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.guard.outputs.configured == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al progetto remoto
        if: steps.guard.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Applica le migration (db push)
        if: steps.guard.outputs.configured == 'true'
        # Su un progetto greenfield la baseline è l'unica migration "vera"; lo
        # storico single-tenant non va spinto. `db push` applica solo le migration
        # non ancora registrate in schema_migrations sul remoto: assicurarsi che il
        # remoto NON abbia mai registrato le vecchie migration single-tenant.
        run: supabase db push

      - name: Deploy delle Edge Function
        if: steps.guard.outputs.configured == 'true'
        # Deploy di tutte le function in supabase/functions/*. La config di
        # verify_jwt (false per stripe-webhook, ecc.) è letta da supabase/config.toml.
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
